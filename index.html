<!DOCTYPE html>
<html>
<head>
  <title>SmartText AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 500px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .output {
      margin-top: 20px;
      padding: 10px;
      background: #f1f1f1;
      border-radius: 8px;
      min-height: 50px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🪼 SmartText AI</h2>

 <textarea id="inputText" rows="8" placeholder="Nhập nội dung cần tóm tắt..."></textarea>

<select id="mode">
  <option value="summary">Tóm tắt</option>
  <option value="rewrite">Viết lại</option>
  <option value="short">Rút gọn</option>
</select>

<button onclick="summarize()">Tóm tắt</button>

  <div class="output" id="output">Kết quả sẽ hiển thị ở đây...</div>
</div>

<script>
function summarize() {
  const input = document.getElementById("inputText").value;
  const output = document.getElementById("output");
  const mode = document.getElementById("mode").value;

  if (!input.trim()) {
    output.innerText = "⚠️ Vui lòng nhập nội dung!";
    return;
  }

  output.innerText = "⏳ Đang xử lý...";

  setTimeout(() => {
    if (mode === "summary") {
      const sentences = input.split(/[.!?]/).filter(s => s.trim().length > 0);
      output.innerText = sentences.slice(0, 2).join(". ") + ".";
    }

    else if (mode === "rewrite") {
      output.innerText = input
        .replace(/important/gi, "essential")
        .replace(/use/gi, "utilize");
    }

    else if (mode === "short") {
      const words = input.split(" ");
      output.innerText = words.slice(0, words.length / 2).join(" ") + "...";
    }

  }, 700);
}
</script>
</body>
</html>
